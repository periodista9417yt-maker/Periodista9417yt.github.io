<script>

const WORKER_URL = "https://obtenerdatoscloud.periodista9417yt.workers.dev";

const PLACE_IDS = [
    91395755011635,
    129571386705741,
    97372931659362,
    126711301917048
];

async function start() {

    const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ placeIds: PLACE_IDS })
    });

    const data = await res.json();

    if (data.available) {

        location.href =
        `roblox://placeId=${data.placeId}&launchData=%7B%22roomId%22%3A2%7D`;

    } else {

        document.body.innerHTML =
        "<h1>No hay juegos disponibles</h1>";
    }
}

start();

</script>
