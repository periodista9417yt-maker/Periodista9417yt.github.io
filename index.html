<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirección de Roblox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        #status {
            font-size: 24px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="status">Verificando servidores disponibles...</div>

    <script>
        // 1. Reemplaza estos números con tu lista de IDs de Roblox en orden de prioridad
        const placeIds = [89741670064748]
        
        // Proxy público para evitar bloqueos de CORS en el navegador
        const proxyUrl = "https://allorigins.win";

        async function checkPlaces() {
            const statusElement = document.getElementById("status");

            for (let id of placeIds) {
                try {
                    statusElement.innerText = `Verificando juego: ${id}...`;

                    // Consultamos la API de universos de Roblox a través del proxy
                    const apiUrl = encodeURIComponent(`https://roblox.com{id}`);
                    const response = await fetch(`${proxyUrl}${apiUrl}`);
                    
                    if (!response.ok) continue;

                    const data = await response.json();
                    const rbxData = JSON.parse(data.contents);

                    // Validamos que el juego exista y tenga un estado válido (no baneado/no privado)
                    if (rbxData && rbxData.length > 0) {
                        const place = rbxData[0];
                        
                        // status: "Playable" significa que el juego está público y disponible
                        if (place.status === "Playable") {
                            statusElement.innerText = "¡Juego encontrado! Redirigiendo...";
                            
                            // 2. Construimos el deep link con tu launchData personalizado
                            const deepLink = `roblox://placeId=${id}&launchData=%7B%22roomId%22%3A%202%7D`;
                            
                            // Ejecutamos la redirección automática
                            window.location.href = deepLink;
                            return; // Detiene la búsqueda al encontrar el primero disponible
                        }
                    }
                } catch (error) {
                    console.error(`Error verificando el ID ${id}:`, error);
                }
            }

            // Si el bucle termina y ninguno fue "Playable"
            statusElement.innerText = "no se encontraron mas juegos";
        }

        // Iniciar la verificación al cargar la página
        window.onload = checkPlaces;
    </script>

</body>
</html>
