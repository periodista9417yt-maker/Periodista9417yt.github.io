<!DOCTYPE html>
<html>
<body>
<script>

(async () => {

    const response = await fetch(
        "https://tu-worker.workers.dev/redirect"
    );

    const data = await response.json();

    if (!data.success) {
        document.body.innerHTML =
            "No hay juegos disponibles.";
        return;
    }

    const launchData = encodeURIComponent(
        JSON.stringify({
            roomId: 2
        })
    );

    location.href =
        `roblox://placeId=${data.placeId}&launchData=${launchData}`;

})();

</script>
</body>
</html>
