<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirección de Juego (Places)</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #1a1a1a; color: white; }
        .loader { border: 16px solid #f3f3f3; border-top: 16px solid #e74c3c; border-radius: 50%; width: 60px; height: 60px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h2>Verificando servidores de mapa disponibles...</h2>
    <div class="loader"></div>
    <p id="status">Analizando la lista de mapas (Places)...</p>

    <script>
        // CONFIGURACIÓN: Reemplaza con tus datos reales
        const PLACE_IDS = [89741670064748]; // Pon tus Place IDs en orden de prioridad
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1516539792098328791/yzIzyFCttlmye39Jj7mgA4dG_94yGwZFAmFLFlcWNpnZBUCI8JH0SLBPKSWEvM9nE9lc";

        // API de Roblox para consultar múltiples mapas simultáneamente
        const ROBLOX_PLACES_API = "https://games.roblox.com/v1/games/multiget-place-details?placeIds=";
        const PROXY_URL = "https://corsproxy.io?"; // Proxy para evadir la restricción CORS del navegador

        async function checkPlaces() {
            const statusText = document.getElementById("status");
            
            // Construimos la URL uniendo todos los IDs separados por comas
            const url = `${PROXY_URL}${encodeURIComponent(ROBLOX_PLACES_API + PLACE_IDS.join(','))}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                // Si la API no devuelve un array válido, cancelamos el proceso
                if (!Array.isArray(data)) {
                    throw new Error("Respuesta inválida de la API");
                }

                // Guardamos los estados creando un mapa basado en el PlaceId para buscar de forma instantánea
                const placesMap = {};
                data.forEach(place => {
                    placesMap[place.placeId] = place.status; // Almacena el estado (ej: "Public" o "Private")
                });

                // Recorremos la lista original respetando el orden estricto de prioridad
                for (const id of PLACE_IDS) {
                    statusText.innerText = `Evaluando disponibilidad del mapa: ${id}...`;
                    
                    // Si el estado en Roblox es explícitamente "Public"
                    if (placesMap[id] === "Public") {
                        statusText.innerText = "¡Mapa público detectado! Abriendo Roblox...";
                        
                        // Deep link oficial de Roblox usando el PlaceId
                        window.location.href = `roblox://placeId=${id}&launchData=%7B%22roomId%22%3A%202%7D`;
                        return; 
                    }
                }

                // En caso de completar el bucle y que ningún mapa devuelva "Public"
                statusText.innerText = "Ningún mapa está público. Enviando alerta a Discord...";
                await notifyDiscord();

            } catch (error) {
                console.error(error);
                statusText.innerText = "Ocurrió un error al intentar leer los datos de Roblox.";
            }
        }

        async function notifyDiscord() {
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: "Roblox Place Monitor",
                        avatar_url: "https://rbxcdn.com",
                        content: "⚠️ **Alerta del Servidor:** Se ha escaneado la lista de accesos y **ninguno** de los Place IDs provistos está configurado como Público actualmente."
                    })
                });
            } catch (err) {
                console.error("Error al enviar la notificación a Discord:", err);
            }
        }

        // Ejecutar la rutina automáticamente al cargar la página en GitHub Pages
        window.onload = checkPlaces;
    </script>
</body>
</html>
