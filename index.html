<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Buscando juego...</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#111;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            text-align:center;
        }

        #status{
            font-size:24px;
        }
    </style>
</head>
<body>

<div id="status">Buscando juego disponible...</div>

<script>
const PLACE_IDS = [
    89741670064748,
    123456789012345,
    987654321098765
];

// URL de tu Cloudflare Worker
const WORKER_URL = "https://obtenerdatoscloud.periodista9417yt.workers.dev/";

async function buscarJuego() {

    for (const placeId of PLACE_IDS) {

        try {

            const response = await fetch(
                `${WORKER_URL}?placeId=${placeId}`
            );

            const data = await response.json();

            if (data.available === true) {

                const launchData = encodeURIComponent(
                    JSON.stringify({
                        roomId: 2
                    })
                );

                window.location.href =
                    `roblox://placeId=${placeId}&launchData=${launchData}`;

                return;
            }

        } catch (err) {
            console.error(err);
        }
    }

    document.getElementById("status").textContent =
        "No se encontraron más juegos";
}

buscarJuego();
</script>

</body>
</html>
